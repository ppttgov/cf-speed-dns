name: Sync-File

on:
  schedule:
    - cron: '0 */5 * * *'  # 每 6 小时运行一次
  workflow_dispatch:       # 允许手动触发

jobs:
  file-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 授予工作流提交权限

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create directory
      run: mkdir -p src  # 自动创建src目录（如果不存在）

    - name: Download worker file
      run: |
        curl -fsSL "https://raw.githubusercontent.com/ZhiXuanWang/cf-speed-dns/main/index.html" -o index.html
        curl -fsSL "https://raw.githubusercontent.com/ZhiXuanWang/cf-speed-dns/refs/heads/main/ipTop.html" -o ipTop.html
        curl -fsSL "https://raw.githubusercontent.com/ZhiXuanWang/cf-speed-dns/refs/heads/main/ipTop10.html" -o ipTop10.html

    - name: Auto-commit changes
      timeout-minutes: 3
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        
        # 检测文件变化后再提交
        if git diff --quiet --exit-code; then
          echo "No changes detected."
        else
          git add index.html ipTop.html ipTop10.html
          git commit -m "chore: Auto-update worker files [$(date +'%Y-%m-%d %H:%M')]"
          git push
          echo "Changes committed successfully."
        fi
